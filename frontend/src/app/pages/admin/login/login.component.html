<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <h1>{{ nombreApp }}</h1>
      <p>Panel del fotógrafo</p>
    </div>

    <div class="login-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" [(ngModel)]="email" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Contraseña</mat-label>
        <input matInput type="password" [(ngModel)]="password" (keyup.enter)="login()"/>
      </mat-form-field>

      <p class="error" *ngIf="error">{{ error }}</p>

      <button mat-flat-button class="btn-login" (click)="login()" [disabled]="cargando">
        <mat-spinner diameter="20" *ngIf="cargando"></mat-spinner>
        <span *ngIf="!cargando">Ingresar</span>
      </button>

      <button mat-button class="btn-volver" (click)="router.navigate(['/galeria'])">
        ← Volver a la galería
      </button>

    </div>

  </div>
</div>
